# =============================================================================
# StarRocks BE Configuration — Bitcoin Real-Time Pipeline
# =============================================================================
# Tuned for shared machine (62GB total RAM, ~40GB allocated to BE)
# See: dmg-bitcoin/starrocks/README.md for historical reference

sys_log_level = INFO

# --- Ports ---
be_port = 9060
be_http_port = 8040
heartbeat_service_port = 9050
brpc_port = 8060
starlet_port = 9070

# --- Memory ---
# Fixed 40GB limit (not 90% default) — leaves room for Bitcoin Core, Kafka,
# MinIO, HMS, Python processes on this 62GB machine
mem_limit = 40G

# --- Storage ---
storage_root_path = /opt/starrocks/be/storage

# --- Spill to Disk ---
# When queries exceed memory, spill intermediate results to SSD
# instead of OOM-killing. Critical for large JOIN/AGG queries.
spill_local_storage_dir = /opt/starrocks/be/spill

# --- JVM (for Iceberg metadata reads via JNI) ---
JAVA_OPTS="--add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED"
